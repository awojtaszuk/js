<!DOCTYPE html>
<html lang="pl">
<head>
<title>Zadanie 40 - Wojtaszuk</title>
<meta charset="utf-8">
<style>
h1 { text-transform: uppercase; }
</style>
</head>
<body>
<h1>Proste działania - Wojtaszuk, klasa 3F</h1>

<label for="a">Podaj pierwszą liczbę:</label> <input type="number" id="a">
<br><br>
<label for="b">Podaj drugą liczbę:</label> <input type="number" id="b">
<br><br>

<input type="button" value="DODAWANIE" onclick="suma_woj()">
<input type="button" value="ODEJMOWANIE" onclick="roznica_woj()">
<input type="button" value="MNOŻENIE" onclick="iloczyn_woj()">
<input type="button" value="DZIELENIE" onclick="iloraz_woj()">
<input type="button" value="TEORIA" onclick="teoria_woj()">

<div id="wynik" style="margin-top:20px;"></div>

<script>
function suma_woj() {
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    if (a == "" || b == "") {
        document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a = parseFloat(a);
        b = parseFloat(b);
        var suma = (a + b).toFixed(2);
        document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + suma;
    }
}

function roznica_woj() {
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    if (a == "" || b == "") {
        document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a = parseFloat(a);
        b = parseFloat(b);
        var roznica = (a - b).toFixed(2);
        document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + roznica;
    }
}

function iloczyn_woj() {
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    if (a == "" || b == "") {
        document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a = parseFloat(a);
        b = parseFloat(b);
        var iloczyn = (a * b).toFixed(2);
        document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloczyn;
    }
}

function iloraz_woj() {
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    if (a == "" || b == "") {
        document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a = parseFloat(a);
        b = parseFloat(b);
        if (b == 0) {
            document.getElementById("wynik").innerHTML = "Nie wolno dzielić przez zero.";
        } else {
            var iloraz = (a / b).toFixed(2);
            document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloraz;
        }
    }
}

// Funkcja TEORIA
function teoria_woj() {
    document.write('<font color=green size=4>1. &lt;label for="a"&gt;Podaj pierwszą liczbę:&lt;/label&gt; &lt;input type="number" id="a"&gt;</font><br>');
    document.write('<font color=green size=4>Ta linijka tworzy etykietę i pole input dla pierwszej liczby.</font><br>');
    document.write('<font color=green size=4>2. &lt;input type="button" value="DODAWANIE" onclick="suma_woj()"&gt;</font><br>');
    document.write('<font color=green size=4>Tworzy przycisk DODAWANIE wywołujący funkcję suma_woj().</font><br>');
    document.write('<font color=green size=4>3. var a = document.getElementById("a").value;</font><br>');
    document.write('<font color=green size=4>Pobiera wartość z pola input o id="a".</font><br>');
    document.write('<font color=green size=4>4. if(a=="" || b=="")</font><br>');
    document.write('<font color=green size=4>Sprawdza, czy którekolwiek pole jest puste.</font><br>');
    document.write('<font color=green size=4>5. document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + suma;</font><br>');
    document.write('<font color=green size=4>Wyświetla wynik działania w elemencie o id="wynik".</font><br>');
}
</script>
</body>
