<!DOCTYPE html>
<html lang="pl-PL">
<head>
<meta charset="UTF-8">
<title>Wojtaszuk Z36_JS</title>
</head>

<body>

<script language="JavaScript">

var x = prompt("Podaj liczbę","");
var a_dana_woj = parseFloat(x);

document.write("Wczytana liczba = "+a_dana_woj+"<br>");

if(a_dana_woj % 2 == 0)
{
document.write("<font color=red size=3>liczba jest parzysta</font><br>");
}

if(a_dana_woj % 2 != 0)
{
document.write("<font color=silver size=5>liczba jest nieparzysta</font><br>");
}

</script>

</body>
</html>
